  .page::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse at 50% 50%, transparent 20%, rgba(0,0,0,0.45) 100%),
      linear-gradient(to bottom, rgba(0,10,5,0.25), rgba(0,10,5,0.35));
  }
  .page::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(
      ellipse at 50% 45%,
      rgba(244,241,236,0.03) 0%,
      transparent 50%
    );
  }
  .brand {
    text-align: center;
    position: relative;
    z-index: 2;
  }
  .wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: clamp(2.4rem, 6vw, 4.8rem);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--off-white);
    margin-bottom: 2.2rem;
    text-shadow: 0 1px 8px rgba(0,0,0,0.3);
    opacity: 0;
    animation: fadeUp 3.8s cubic-bezier(0.22, 0.6, 0.36, 1) 1s forwards;
  }
  .rule {
    width: 80px;
    height: 1px;
    background: var(--off-white-dim);
    margin: 0 auto 2.2rem;
    opacity: 0;
    animation: fadeUp 3.2s cubic-bezier(0.22, 0.6, 0.36, 1) 2.8s forwards;
  }
  .tagline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-size: clamp(1rem, 2.2vw, 1.35rem);
    letter-spacing: 0.04em;
    color: var(--off-white-dim);
    font-style: italic;
    text-shadow: 0 1px 6px rgba(0,0,0,0.25);
    opacity: 0;
    animation: fadeUp 3.8s cubic-bezier(0.22, 0.6, 0.36, 1) 4.2s forwards;
  }
  .values {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: clamp(1.5rem, 4vw, 3.5rem);
    padding: 1.8rem 2rem;
    border-top: 1px solid var(--off-white-ghost);
    z-index: 2;
    opacity: 0;
    animation: fadeUp 4s cubic-bezier(0.22, 0.6, 0.36, 1) 6.5s forwards;
  }
  .values span {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.55rem, 1.2vw, 0.72rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--off-white-faint);
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .status {
    position: absolute;
    top: 2.5rem;
    right: 3rem;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--off-white-faint);
    z-index: 2;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    opacity: 0;
    animation: fadeUp 4s cubic-bezier(0.22, 0.6, 0.36, 1) 8.5s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 600px) {
    .values { gap: 1rem; padding: 1.2rem 1rem; }
    .values span { font-size: 0.5rem; letter-spacing: 0.15em; }
    .status { top: 1.5rem; right: 1.5rem; }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="status">Acquiring...</div>
    <div class="brand">
      <h1 class="wordmark">Duburgh's</h1>
      <div class="rule"></div>
      <p class="tagline">Luxury is a sense of place.</p>
    </div>
    <div class="values">
      <span>Curation</span>
      <span>Ritual</span>
      <span>Stewardship</span>
    </div>
  </div>
</body>

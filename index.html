<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duburgh's</title>
<meta name="description" content="Duburgh's — Luxury is a sense of place.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Duburgh's">
<meta property="og:title" content="Duburgh's">
<meta property="og:description" content="Luxury is a sense of place.">
<meta property="og:url" content="https://duburghs.com/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Duburgh's">
<meta name="twitter:description" content="Luxury is a sense of place.">
<meta name="theme-color" content="#0a2018">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%231a3a2a'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-size='18' font-weight='300' fill='%23f4f1ec'%3ED%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --off-white: #f4f1ec;
    --off-white-dim: rgba(244, 241, 236, 0.55);
    --off-white-faint: rgba(244, 241, 236, 0.3);
    --off-white-ghost: rgba(244, 241, 236, 0.12);
    --green-deep: #0a2018;
    --green-mid: #0f2e22;
    --green-warm: #132e1f;
    --green-dark: #071a12;
  }
  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--green-deep);
    color: var(--off-white);
    overflow: hidden;
  }

  /* ─── CSS-only simulated leather grain ─── */
  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    position: relative;
    background-color: var(--green-deep);
  }

  /* Layer 1: base pebble texture using radial gradients */
  .page::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      /* Large soft pebble impressions */
      radial-gradient(ellipse 120px 90px at 15% 20%, rgba(20,50,35,0.5) 0%, transparent 70%),
      radial-gradient(ellipse 100px 130px at 75% 15%, rgba(15,45,30,0.4) 0%, transparent 65%),
      radial-gradient(ellipse 140px 100px at 45% 55%, rgba(18,48,33,0.45) 0%, transparent 60%),
      radial-gradient(ellipse 90px 120px at 85% 65%, rgba(12,38,25,0.5) 0%, transparent 70%),
      radial-gradient(ellipse 110px 80px at 25% 80%, rgba(16,42,28,0.4) 0%, transparent 65%),
      radial-gradient(ellipse 130px 110px at 60% 85%, rgba(20,52,36,0.45) 0%, transparent 60%),
      radial-gradient(ellipse 100px 90px at 10% 50%, rgba(14,40,27,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 80px 100px at 90% 35%, rgba(18,46,32,0.4) 0%, transparent 65%),
      radial-gradient(ellipse 150px 120px at 50% 25%, rgba(22,55,38,0.35) 0%, transparent 55%),
      radial-gradient(ellipse 100px 140px at 35% 40%, rgba(10,35,22,0.45) 0%, transparent 60%),
      /* Vignette */
      radial-gradient(ellipse at 50% 50%, transparent 20%, rgba(0,0,0,0.45) 100%),
      linear-gradient(to bottom, rgba(0,10,5,0.25), rgba(0,10,5,0.35));
  }

  /* Layer 2: fine grain noise via SVG filter */
  .grain {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.35;
    mix-blend-mode: overlay;
  }

  /* Layer 3: subtle highlight for depth */
  .page::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      /* Central warm light */
      radial-gradient(
        ellipse 70% 60% at 50% 45%,
        rgba(244,241,236,0.025) 0%,
        transparent 100%
      ),
      /* Subtle leather sheen bands */
      repeating-linear-gradient(
        165deg,
        transparent 0px,
        transparent 3px,
        rgba(244,241,236,0.008) 3px,
        rgba(244,241,236,0.008) 4px
      ),
      /* Organic creases */
      linear-gradient(135deg,
        transparent 0%, transparent 30%,
        rgba(0,0,0,0.06) 30%, rgba(0,0,0,0.06) 30.3%,
        transparent 30.3%, transparent 55%,
        rgba(0,0,0,0.04) 55%, rgba(0,0,0,0.04) 55.2%,
        transparent 55.2%, transparent 78%,
        rgba(0,0,0,0.05) 78%, rgba(0,0,0,0.05) 78.2%,
        transparent 78.2%
      ),
      linear-gradient(42deg,
        transparent 0%, transparent 25%,
        rgba(0,0,0,0.03) 25%, rgba(0,0,0,0.03) 25.15%,
        transparent 25.15%, transparent 62%,
        rgba(0,0,0,0.04) 62%, rgba(0,0,0,0.04) 62.2%,
        transparent 62.2%
      );
  }

  .brand {
    text-align: center;
    position: relative;
    z-index: 2;
  }
  .wordmark {
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: clamp(2.4rem, 6vw, 4.8rem);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--off-white);
    margin-bottom: 2.2rem;
    text-shadow: 0 1px 8px rgba(0,0,0,0.3);
    opacity: 0;
    animation: fadeUp 3.8s cubic-bezier(0.22, 0.6, 0.36, 1) 1s forwards;
  }
  .rule {
    width: 80px;
    height: 1px;
    background: var(--off-white-dim);
    margin: 0 auto 2.2rem;
    opacity: 0;
    animation: fadeUp 3.2s cubic-bezier(0.22, 0.6, 0.36, 1) 2.8s forwards;
  }
  .tagline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-size: clamp(1rem, 2.2vw, 1.35rem);
    letter-spacing: 0.04em;
    color: var(--off-white-dim);
    font-style: italic;
    text-shadow: 0 1px 6px rgba(0,0,0,0.25);
    opacity: 0;
    animation: fadeUp 3.8s cubic-bezier(0.22, 0.6, 0.36, 1) 4.2s forwards;
  }
  .values {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: clamp(1.5rem, 4vw, 3.5rem);
    padding: 1.8rem 2rem;
    border-top: 1px solid var(--off-white-ghost);
    z-index: 2;
    opacity: 0;
    animation: fadeUp 4s cubic-bezier(0.22, 0.6, 0.36, 1) 6.5s forwards;
  }
  .values span {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: clamp(0.55rem, 1.2vw, 0.72rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--off-white-faint);
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .status {
    position: absolute;
    top: 2.5rem;
    right: 3rem;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--off-white-faint);
    z-index: 2;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    opacity: 0;
    animation: fadeUp 4s cubic-bezier(0.22, 0.6, 0.36, 1) 8.5s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 600px) {
    .values { gap: 1rem; padding: 1.2rem 1rem; }
    .values span { font-size: 0.5rem; letter-spacing: 0.15em; }
    .status { top: 1.5rem; right: 1.5rem; }
  }
</style>
</head>
<body>
  <div class="page">
    <!-- SVG noise filter for leather grain -->
    <svg class="grain" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <filter id="leather">
        <feTurbulence type="fractalNoise" baseFrequency="0.65 0.65" numOctaves="6" seed="2" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
        <feComponentTransfer>
          <feFuncR type="linear" slope="0.12" intercept="0.04"/>
          <feFuncG type="linear" slope="0.15" intercept="0.09"/>
          <feFuncB type="linear" slope="0.1" intercept="0.05"/>
        </feComponentTransfer>
      </filter>
      <rect width="100%" height="100%" filter="url(#leather)"/>
    </svg>

    <div class="status">Acquiring...</div>
    <div class="brand">
      <h1 class="wordmark">Duburgh's</h1>
      <div class="rule"></div>
      <p class="tagline">Luxury is a sense of place.</p>
    </div>
    <div class="values">
      <span>Curation</span>
      <span>Ritual</span>
      <span>Stewardship</span>
    </div>
  </div>
</body>
</html>
